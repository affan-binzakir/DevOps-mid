<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Exam App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>DevOps Exam Application</h1>
        <div class="card">
            <h2>Current Message from DB:</h2>
            <p id="db-message">Loading...</p>
        </div>
        
        <div class="card">
            <h2>Update Message:</h2>
            <input type="text" id="newMessage" placeholder="Type a new message...">
            <button onclick="updateMessage()">Update</button>
        </div>
    </div>

    <script>
        async function fetchMessage() {
            try {
                const response = await fetch('/api/message');
                const data = await response.json();
                document.getElementById('db-message').innerText = data.message;
            } catch (error) {
                console.error('Error fetching message:', error);
                document.getElementById('db-message').innerText = 'Error loading message.';
            }
        }

        async function updateMessage() {
            const textInput = document.getElementById('newMessage');
            const text = textInput.value;
            if (!text) return;

            try {
                const response = await fetch('/api/message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text })
                });
                
                if (response.ok) {
                    textInput.value = '';
                    fetchMessage();
                }
            } catch (error) {
                console.error('Error updating message:', error);
            }
        }

        // Fetch on load
        fetchMessage();
    </script>
</body>
</html>
